<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">

    <title>MovieMiner</title>
</head>

<body class="bg-dark text-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-black shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">🎬 MovieMiner</a>
    </div>
</nav>

<div class="container py-4">

    <!-- 🔍 SEARCH BAR -->
    <div class="row mb-4">
        <div class="col-md-6">
            <input type="text" id="search" class="form-control" placeholder="Search movies...">
        </div>

        <div class="col-md-4">
            <select id="genre" class="form-select">
                <option value="">All Genres</option>
                <option value="Action">Action</option>
                <option value="Comedy">Comedy</option>
                <option value="Drama">Drama</option>
                <option value="Horror">Horror</option>
            </select>
        </div>
    </div>

    <div id="results" class="row"></div>

    <div class="text-center mt-4">
        <button id="loadMore" class="btn btn-warning px-4">Load More</button>
    </div>

</div>

<script src="/static/script.js"></script>
</body>
</html>
